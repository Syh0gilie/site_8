<body>
    <div class="map-container">
        <div id="svg-container">
            <!-- Corrected path for static site -->
            <img src="static/images/map_bg.png" class="map-bg">
            <div id="interactive-layer" class="svg-layer"></div>
        </div>
    </div>

    <!-- Enhanced Modal -->
    <div class="modal-simple" id="modal">
        <div id="modal-content">
            <img id="modal-photo" src="" style="display: none;">
            <h2 id="modal-name"></h2>
            <p id="modal-msg"></p>
            <button onclick="document.getElementById('modal').style.display='none'">Закрыть</button>
        </div>
    </div>

    <script>
        // Use v2 or v3 as preferred
        fetch('static/map_v2.svg')
            .then(res => res.text())
            .then(data => {
                const container = document.getElementById('interactive-layer');
                container.innerHTML = data;

                const svg = container.querySelector('svg');
                if (svg) {
                    svg.setAttribute('width', '100%');
                    svg.setAttribute('height', '100%');
                }

                const regions = container.querySelectorAll('[id^="_"]');
                regions.forEach(r => {
                    // Skip layers
                    if (r.id.includes('Слой') || r.id.includes('\u0421\u043b\u043e\u0439')) {
                        r.style.pointerEvents = 'none';
                        return;
                    }

                    r.style.cursor = 'pointer';
                    r.style.pointerEvents = 'all';
                    r.onclick = (e) => {
                        e.stopPropagation();
                        const sid = r.id;
                        const lore = GREETINGS_DATA[sid];

                        if (lore) {
                            document.getElementById('modal-name').innerText = lore.first_name;
                            document.getElementById('modal-msg').innerText = lore.message;

                            const photoImg = document.getElementById('modal-photo');
                            if (lore.photo_url) {
                                photoImg.src = lore.photo_url;
                                photoImg.style.display = 'block';
                            } else {
                                photoImg.style.display = 'none';
                            }
                            document.getElementById('modal').style.display = 'flex';
                        }
                    };
                });
            })
            .catch(err => console.error("Error loading SVG:", err));

        // Background click to close modal
        document.getElementById('modal').onclick = function (e) {
            if (e.target === this) {
                this.style.display = 'none';
            }
        };
    </script>
</body>

</html>
